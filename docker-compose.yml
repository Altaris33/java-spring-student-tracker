version: '3.9'

services:

  mariadb:
    image: mariadb:11.3
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_tracker
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  student-api:
    build: .
    container_name: student-api
    depends_on:
      - mariadb
    ports:
      - "7070:7070"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/student_tracker
      SPRING_DATASOURCE_USERNAME: springstudent
      SPRING_DATASOURCE_PASSWORD: springstudent

volumes:
  mariadb_data: